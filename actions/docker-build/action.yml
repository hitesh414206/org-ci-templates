name: "AWS OIDC Login"
description: "Assume AWS role using GitHub OIDC"

inputs:
  role-arn:
    required: true
  aws-region:
    required: true

runs:
  using: "composite"
  steps:
    - uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - uses: aws-actions/amazon-ecr-login@v2